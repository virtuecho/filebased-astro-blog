name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      - name: Lint source
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Lint docs
        run: pnpm docs:lint

      - name: Check architecture
        run: pnpm arch:check

      - name: Build static site
        run: pnpm build
